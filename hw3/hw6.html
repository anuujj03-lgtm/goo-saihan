<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B25FM1037</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
body{
background:rgb(230, 195, 195);
font-family:Arial;
}
.title{
color:#000000;
text-align:center;
margin-bottom:20px;
}
.cardbox{
background:#f1f1f1;
padding:20px;
border-radius:10px;
}
.mobile-img{
width:100%;
height:120px;
background:#cfcfcf;
margin-bottom:12px;
border-radius:6px;
object-fit:cover;
}
.carousel-item img{
height:250px;
background:#cfcfcf;
object-fit:cover;
border-radius:6px;
}
.wrapper{
margin-top:60px;
}
</style>
</head>
<body>
<div class="container wrapper">
<div class="row g-5">
<div class="col-md-6">
<h2 class="title">mobile</h2>
<div class="cardbox">
<img class="mobile-img" src="IMG_1219.JPG">
<img class="mobile-img" src="IMG_7486.JPG">
<img class="mobile-img" src="IMG_5294.JPG">
</div>
</div>

<div class="col-md-6">
<h2 class="title">desktop</h2>
<div class="cardbox">
<div id="slider" class="carousel slide" data-bs-ride="carousel">
<div class="carousel-inner">
<div class="carousel-item active">
<img src="IMG_1219.JPG" class="d-block w-100">
</div>
<div class="carousel-item">
<img src="IMG_7486.JPG" class="d-block w-100">
</div>
<div class="carousel-item">
<img src="IMG_5294.JPG" class="d-block w-100">
</div>
</div>
<button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>
<button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>
</div>
</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
