<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>lab5</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#ffffff;
}

/* HEADER */
header{
  background:#79a9d1;
  padding:20px;
}

.menu{
  display:flex;
  justify-content:center;
  gap: 30px;
}

.menu button{
  padding:10px 40px;
  border:none;
  background:#d9d9d9;
  box-shadow:0 3px 5px rgba(0,0,0,0.2);
}

/* MAIN */
.container{
  display:flex;
  gap:20px;
  padding: 20px;
}

.profile{
  background:#ddd;
  flex:1;
  padding:40px;
  text-align:center;
}

.photo{
  background:#666;
  color:white;
  padding:70px;
  margin-bottom:20px;
  font-size:20px;
}

.info hr{
  margin:10px auto;
  width:80%;
  border:1px solid black;
}

.content{
  background:#ddd;
  flex:5;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
}

/* FOOTER */
footer{
  background:#d8897b;
  text-align:center;
  padding:20px;
  font-size:20px;
  margin:20px;
}

/* DESKTOP (>1024px) */
@media (min-width:1025px){
  .container{
    flex-direction:row;
  }
  .profile{width:50%;}
  .content{width:50%;}
}

/* TABLET (601px–1024px) */
@media (max-width:1024px) and (min-width:601px){
  .container{
    flex-direction:row;
  }
  .profile{width:50%;}
  .content{width:50%;}
}

/* MOBILE (≤600px) */
@media (max-width:600px){
  .menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .menu button{width:100%;}

  .container{
    flex-direction:column;
  }
  .profile{
    padding:40px 20px;
    width:100%;
  }
  .photo{
    width:200px;
    margin:auto;
  }
  .content{
    height:300px;
    width:100%;
  }
}
</style>
</head>

<body>
<header>
  <div class="menu">
    <button>Нүүр хуудас</button>
    <button>Зурагнууд</button>
    <button>Бичлэгүүд</button>
    <button>Газрын зураг</button>
  </div>
</header>

<div class="container">
  <div class="profile">
    <div class="photo">ПРОФАЙЛ<br>ЗУРАГ</div>
    <h3>Хувийн мэдээлэл</h3>
    <div class="info">
      <hr><hr><hr><hr>
    </div>
  </div>
  <div class="content">Агуулга</div>
</div>

<footer>Гэрийн хаяг</footer>
</body>
</html>
